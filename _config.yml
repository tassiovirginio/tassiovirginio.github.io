# Site settings
title: Tássio Virgínio
description: 'Jekyll-Uno - a minimal, responsive theme for Jekyll'
url: 'http://tassiovirginio.com'
baseurl: ''
# google_analytics: 'UA-XXXXXX-X'
# disqus_shortname: 'your-disqus-name'

author:
  name: 'Tássio Virgínio'
  email: contato@tassiovirginio.com
  twitter_username: tassiovirginio
  # facebook_username: tassiovirginio
  github_username:  tassiovirginio
  linkedin_username:  tassiovirginio

defaults:
  -
    scope:
      path: ''
      type: 'posts'
    values:
        layout: 'post'

# Build settings
destination: _site
paginate: 10
permalink: /:year/:title/
markdown: kramdown
highlighter: rouge

sass:
    sass_dir: _sass
    style: compressed

kramdown:
  # use Github Flavored Markdown
  input: GFM
  # do not replace newlines by <br>s
  hard_wrap: false

plugins: ['jekyll-paginate']
exclude: ['README.md', 'Gemfile', 'Gemfile.lock', 'screenshot.png']
