# your resume. this file path should be relative to you "static" directory
# Dreprecated. Use resourceLinks instead.
# resume: "files/resume.pdf"

# a summary about you
summary: 'Sou professor, pesquisador e engenheiro de software apaixonado, com mais de 20 anos de experiência. Trabalho com Java, Rust, Python e TypeScript em projetos open-source focados em qualidade de software. Minha pesquisa explora Test Smells, Large Language Models (LLMs) e qualidade de testes automatizados. Sou criador do JNose (detector de Test Smells para Java), DNose (detector de Test Smells para Dart), Try-RS, e coautor do AriesLinter e RAIDE. Atualmente sou doutorando em Ciência da Computação pela UFBA e professor no Instituto Federal do Tocantins (IFTO).'

